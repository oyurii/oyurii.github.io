<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting...</title>
</head>
<body>
  <script>
    (async function () {
      var supported = ["en", "uk"];
      var saved = localStorage.getItem("site_lang");
      var nav = (navigator.language || "en").toLowerCase();
      var lang = supported.indexOf(saved) >= 0 ? saved : (nav.indexOf("uk") === 0 ? "uk" : "en");
      var path = window.location.pathname || "/";
      var base = path.replace(/index\.html?$/i, "");
      if (!base.endsWith("/")) base += "/";
      var p1 = base + lang + "/";
      var p2 = p1.startsWith("/docs/") ? p1.replace(/^\/docs/, "") : "/docs" + p1;
      var candidates = Array.from(new Set([p1, p2]));
      for (var i = 0; i < candidates.length; i++) {
        try {
          var r = await fetch(candidates[i], { cache: "no-store" });
          if (r.ok) {
            window.location.replace(candidates[i]);
            return;
          }
        } catch (e) {}
      }
    })();
  </script>
  Redirecting...
</body>
</html>
